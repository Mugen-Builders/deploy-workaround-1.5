app = "test-deploy323"

[build]
image = "registry.fly.io/test-deploy323"

[http_service]
internal_port = 10000
force_https = true

[http_service.concurrency]
type = "requests"
soft_limit = 200
hard_limit = 250

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
timeout = "5s"
path = "/healthz"

[[vm]]
size = "shared-cpu-1x"
memory = "2gb"

[env]
CARTESI_BLOCKCHAIN_FINALITY_OFFSET = "1"
CARTESI_BLOCKCHAIN_ID = "11155111"
CARTESI_CONTRACTS_APPLICATION_ADDRESS = "0x0981B836699Ba5D4F58F8711125f7b09ab02Ab4e"
CARTESI_CONTRACTS_AUTHORITY_ADDRESS = "0x44E4DA426B9d337D1Bd5B3118B5Bd0E35dc0d560"
CARTESI_CONTRACTS_HISTORY_ADDRESS = "0x65DF9Aa6EdcFC04635AA4c9980Ad7c287CF709Dd"
CARTESI_CONTRACTS_INPUT_BOX_ADDRESS = "0x59b22D57D4f067708AB0c00552767405926dc768"
CARTESI_CONTRACTS_INPUT_BOX_DEPLOYMENT_BLOCK_NUMBER = "3963384"
CARTESI_EPOCH_LENGTH = "7200"